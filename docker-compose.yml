# Local development stack for Nimbus.
# Runs the frontend, backend, and a PostgreSQL database with mock AI + disabled
# auth so the app works with no real Azure dependencies.
#
#   docker compose up --build
#
services:
  db:
    # Postgres 16 with the pgvector extension baked in (RAG embeddings).
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: nimbus
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-nimbus_local_pw}"
      POSTGRES_DB: nimbus
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nimbus -d nimbus"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  api:
    build:
      context: ./apps/api
    command: >
      /bin/bash -lc "alembic upgrade head &&
      uvicorn app.main:app --host 0.0.0.0 --port 8000"
    environment:
      ENVIRONMENT: local
      AI_PROVIDER: "${AI_PROVIDER:-mock}"
      AUTH_MODE: "${AUTH_MODE:-disabled}"
      CORS_ALLOW_ORIGINS: "http://localhost:3000"
      DATABASE_URL: "postgresql+psycopg://nimbus:${POSTGRES_PASSWORD:-nimbus_local_pw}@db:5432/nimbus"
      AZURE_TENANT_ID: "${AZURE_TENANT_ID:-}"
      ENTRA_BACKEND_CLIENT_ID: "${ENTRA_BACKEND_CLIENT_ID:-}"
      ENTRA_BACKEND_APP_ID_URI: "${ENTRA_BACKEND_APP_ID_URI:-}"
      ADMIN_GROUP_ID: "${ADMIN_GROUP_ID:-}"
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  web:
    build:
      context: ./apps/web
      args:
        NEXT_PUBLIC_API_BASE_URL: "http://localhost:8000"
        NEXT_PUBLIC_AUTH_DISABLED: "${NEXT_PUBLIC_AUTH_DISABLED:-true}"
        NEXT_PUBLIC_ENTRA_CLIENT_ID: "${NEXT_PUBLIC_ENTRA_CLIENT_ID:-}"
        NEXT_PUBLIC_ENTRA_TENANT_ID: "${NEXT_PUBLIC_ENTRA_TENANT_ID:-}"
        NEXT_PUBLIC_ENTRA_API_SCOPE: "${NEXT_PUBLIC_ENTRA_API_SCOPE:-}"
        NEXT_PUBLIC_ENTRA_REDIRECT_URI: "http://localhost:3000"
    environment:
      NEXT_PUBLIC_API_BASE_URL: "http://localhost:8000"
      NEXT_PUBLIC_AUTH_DISABLED: "${NEXT_PUBLIC_AUTH_DISABLED:-true}"
      NEXT_PUBLIC_ENTRA_CLIENT_ID: "${NEXT_PUBLIC_ENTRA_CLIENT_ID:-}"
      NEXT_PUBLIC_ENTRA_TENANT_ID: "${NEXT_PUBLIC_ENTRA_TENANT_ID:-}"
      NEXT_PUBLIC_ENTRA_API_SCOPE: "${NEXT_PUBLIC_ENTRA_API_SCOPE:-}"
      NEXT_PUBLIC_ENTRA_REDIRECT_URI: "http://localhost:3000"
    ports:
      - "3000:3000"
    depends_on:
      - api
