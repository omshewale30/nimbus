# Local development stack for Nimbus.
# Runs the frontend, backend, and a SQL Server database with mock AI + disabled
# auth so the app works with no real Azure dependencies.
#
#   docker compose up --build
#
services:
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "${SQL_SA_PASSWORD:-Your_password123}"
    ports:
      - "1433:1433"
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$${MSSQL_SA_PASSWORD}\" -No -Q 'SELECT 1' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  api:
    build:
      context: ./apps/api
    command: >
      /bin/bash -lc "alembic upgrade head &&
      uvicorn app.main:app --host 0.0.0.0 --port 8000"
    environment:
      ENVIRONMENT: local
      AI_PROVIDER: "${AI_PROVIDER:-mock}"
      AUTH_MODE: "${AUTH_MODE:-disabled}"
      CORS_ALLOW_ORIGINS: "http://localhost:3000"
      DATABASE_URL: "mssql+pyodbc://sa:${SQL_SA_PASSWORD:-Your_password123}@db:1433/master?driver=ODBC+Driver+18+for+SQL+Server&TrustServerCertificate=yes"
      AZURE_TENANT_ID: "${AZURE_TENANT_ID:-}"
      ENTRA_BACKEND_CLIENT_ID: "${ENTRA_BACKEND_CLIENT_ID:-}"
      ENTRA_BACKEND_APP_ID_URI: "${ENTRA_BACKEND_APP_ID_URI:-}"
      ADMIN_GROUP_ID: "${ADMIN_GROUP_ID:-}"
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  web:
    build:
      context: ./apps/web
      args:
        NEXT_PUBLIC_API_BASE_URL: "http://localhost:8000"
        NEXT_PUBLIC_AUTH_DISABLED: "${NEXT_PUBLIC_AUTH_DISABLED:-true}"
        NEXT_PUBLIC_ENTRA_CLIENT_ID: "${NEXT_PUBLIC_ENTRA_CLIENT_ID:-}"
        NEXT_PUBLIC_ENTRA_TENANT_ID: "${NEXT_PUBLIC_ENTRA_TENANT_ID:-}"
        NEXT_PUBLIC_ENTRA_API_SCOPE: "${NEXT_PUBLIC_ENTRA_API_SCOPE:-}"
        NEXT_PUBLIC_ENTRA_REDIRECT_URI: "http://localhost:3000"
    environment:
      NEXT_PUBLIC_API_BASE_URL: "http://localhost:8000"
      NEXT_PUBLIC_AUTH_DISABLED: "${NEXT_PUBLIC_AUTH_DISABLED:-true}"
      NEXT_PUBLIC_ENTRA_CLIENT_ID: "${NEXT_PUBLIC_ENTRA_CLIENT_ID:-}"
      NEXT_PUBLIC_ENTRA_TENANT_ID: "${NEXT_PUBLIC_ENTRA_TENANT_ID:-}"
      NEXT_PUBLIC_ENTRA_API_SCOPE: "${NEXT_PUBLIC_ENTRA_API_SCOPE:-}"
      NEXT_PUBLIC_ENTRA_REDIRECT_URI: "http://localhost:3000"
    ports:
      - "3000:3000"
    depends_on:
      - api
